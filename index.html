<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>白板 & 广场 & 答案</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    overflow: hidden;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  }

  /* 磨砂玻璃按钮 */
  .glass-btn {
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: #333;
    padding: 12px 24px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 15px;
    z-index: 10;
    transition: all 0.2s ease;
  }
  .glass-btn:hover {
    background: rgba(255, 255, 255, 0.4);
    transform: translateY(-1px);
  }

  /* 页面切换 + 背景图设置 */
  .page {
    position: fixed;
    width: 100vw;
    height: 100vh;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.7s ease;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  .page.show {
    opacity: 1;
    pointer-events: auto;
  }

  /* 白板页背景：baiban.png */
  #board {
    background-image: url('baiban.png');
  }

  /* 广场页 + 答案页背景：caoping.png */
  #square, #answer {
    background-image: url('caoping.png');
  }

  #toSquare {
    position: fixed;
    right: 24px;
    bottom: 24px;
  }
  #boardContent {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
  }
  .board-item {
    position: absolute;
    max-width: 220px;
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(5px);
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    font-size: 15px;
    line-height: 1.6;
    color: #333;
    cursor: move;
    user-select: none;
    z-index: 5;
  }

  .topic-wrap {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    width: 90vw;
    max-width: 600px;
    padding: 32px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(8px);
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  #keywordInputs {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 24px;
  }
  .kw-input {
    width: 120px;
    padding: 12px;
    border: 1px solid rgba(0,0,0,0.2);
    border-radius: 10px;
    text-align: center;
    font-size: 16px;
    background: rgba(255, 255, 255, 0.7);
  }
  .btn-group {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 32px;
  }
  #question {
    font-size: 24px;
    color: #222;
    padding: 20px;
    min-height: 60px;
    background: rgba(255, 255, 255, 0.7);
    border-radius: 12px;
    line-height: 1.5;
  }

  .answer-wrap {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90vw;
    max-width: 700px;
    padding: 32px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(8px);
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    cursor: pointer;
    z-index: 5;
  }
  #answerQuestion {
    font-size: 22px;
    color: #222;
    margin-bottom: 24px;
    line-height: 1.5;
    font-weight: 500;
  }
  #answerContent {
    font-size: 18px;
    color: #444;
    line-height: 1.8;
    white-space: pre-line;
  }

  #backToSquare {
    position: fixed;
    left: 24px;
    bottom: 24px;
  }
  #backToBoard {
    position: fixed;
    left: 24px;
    top: 24px;
  }

  /* 浮动评论框 */
  .floating-comment {
    position: absolute;
    width: 280px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-radius: 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    padding: 16px;
    z-index: 9999;
    display: none;
  }
  .floating-comment textarea {
    width: 100%;
    height: 80px;
    padding: 10px;
    border: 1px solid rgba(0,0,0,0.2);
    border-radius: 8px;
    resize: none;
    font-size: 14px;
    margin-bottom: 10px;
    background: rgba(255, 255, 255, 0.8);
  }
  .comment-flex {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .comment-flex button {
    padding: 6px 12px;
    font-size: 13px;
  }
</style>
</head>

<body>

<div class="page show" id="board">
  <div id="boardContent"></div>
  <button class="glass-btn" id="toSquare">前往广场</button>
</div>

<div class="page" id="square">
  <div class="topic-wrap">
    <div id="keywordInputs">
      <input class="kw-input" type="text" placeholder="关键词1" id="A" readonly>
      <input class="kw-input" type="text" placeholder="关键词2" id="B" readonly>
      <input class="kw-input" type="text" placeholder="关键词3" id="C" readonly>
    </div>
    <div class="btn-group">
      <button class="glass-btn" id="generateBtn">提问</button>
      <button class="glass-btn" id="toAnswerBtn">答案</button>
    </div>
    <div id="question"></div>
  </div>
</div>

<div class="page" id="answer">
  <div class="answer-wrap" id="answerArea">
    <div id="answerQuestion"></div>
    <div id="answerContent"></div>
  </div>

  <button class="glass-btn" id="backToSquare">返回广场</button>
  <button class="glass-btn" id="backToBoard">← 回到白板</button>
</div>

<div class="floating-comment" id="floatComment">
  <textarea id="commentText" placeholder="说点什么..."></textarea>
  <div class="comment-flex">
    <button class="glass-btn" id="cCancel">取消</button>
    <button class="glass-btn" id="cSubmit">发布</button>
  </div>
</div>

<script>
  const board = document.getElementById('board');
  const square = document.getElementById('square');
  const answer = document.getElementById('answer');

  const boardContent = document.getElementById('boardContent');
  const toSquare = document.getElementById('toSquare');

  const A = document.getElementById('A');
  const B = document.getElementById('B');
  const C = document.getElementById('C');
  const generateBtn = document.getElementById('generateBtn');
  const toAnswerBtn = document.getElementById('toAnswerBtn');
  const question = document.getElementById('question');

  const answerArea = document.getElementById('answerArea');
  const answerQuestion = document.getElementById('answerQuestion');
  const answerContent = document.getElementById('answerContent');
  const backToSquare = document.getElementById('backToSquare');
  const backToBoard = document.getElementById('backToBoard');

  const floatComment = document.getElementById('floatComment');
  const commentText = document.getElementById('commentText');
  const cCancel = document.getElementById('cCancel');
  const cSubmit = document.getElementById('cSubmit');

  let keywords = { kw1: '', kw2: '', kw3: '' };
  let currentQuestion = '';

  let dragItem = null;
  let offsetX = 0, offsetY = 0;

  // 白板点击事件
  board.addEventListener('click', (e) => {
    if (e.target === toSquare || e.target.closest('#floatComment') || e.target.closest('.board-item')) {
      if (!e.target.closest('.board-item') && e.target !== toSquare && !e.target.closest('#floatComment')) {
        showCommentAtPosition(e.clientX, e.clientY);
      }
      return;
    }

    const kw1 = prompt('关键词 1：');
    if (!kw1?.trim()) return;
    const kw2 = prompt('关键词 2：');
    if (!kw2?.trim()) return;
    const kw3 = prompt('关键词 3：');
    if (!kw3?.trim()) return;

    keywords.kw1 = kw1.trim();
    keywords.kw2 = kw2.trim();
    keywords.kw3 = kw3.trim();

    const el = document.createElement('div');
    el.className = 'board-item';
    el.innerHTML = `关键词1：${keywords.kw1}<br>关键词2：${keywords.kw2}<br>关键词3：${keywords.kw3}`;
    el.style.left = e.clientX + 'px';
    el.style.top = e.clientY + 'px';
    boardContent.appendChild(el);

    el.addEventListener('mousedown', (e) => {
      dragItem = el;
      offsetX = e.clientX - el.offsetLeft;
      offsetY = e.clientY - el.offsetTop;
      el.style.zIndex = 100;
    });
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragItem) return;
    dragItem.style.left = (e.clientX - offsetX) + 'px';
    dragItem.style.top = (e.clientY - offsetY) + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (dragItem) {
      dragItem.style.zIndex = 5;
      dragItem = null;
    }
  });

  toSquare.addEventListener('click', () => {
    if (!keywords.kw1 || !keywords.kw2 || !keywords.kw3) {
      alert('请先在白板点击创建3个关键词！');
      return;
    }
    board.classList.remove('show');
    setTimeout(() => {
      A.value = keywords.kw1;
      B.value = keywords.kw2;
      C.value = keywords.kw3;
      square.classList.add('show');
    }, 400);
  });

  generateBtn.addEventListener('click', () => {
    const a = A.value.trim();
    const b = B.value.trim();
    const c = C.value.trim();
    if (!a || !b || !c) { alert('关键词不完整！'); return; }

    const questions = [
      `100只${a}围攻1只${b}，谁能赢？`,
      `100只${a}正面硬刚1只${b}，谁更强？`,
      `100只${a}突袭1只${b}，能一波带走吗？`,
      `100只${a}对战1只${b}死斗到全灭，谁赢？`,
      `100只${a}穿越到${b}的世界，能活多久？`,
      `100只${a}闯入${b}地盘，会被秒杀吗？`,
      `100只${a}在${b}主场作战，能撑多久？`,
      `100只${a} vs 100只${b}抢${c}，谁能抢到？`,
      `100只${a}和100只${b}为${c}混战，谁赢？`,
      `${c}被藏起来，${a}和${b}谁先找到？`,
      `1只${a}单挑100只${b}，能反杀吗？`,
      `1只${a}被100只${b}包围，能突围吗？`,
      `1只${a}冲脸100只${b}，能清场吗？`,
      `100只${a}和${b}合作，能搞定${c}吗？`,
      `100只${a}给${b}打工，${c}会崩盘吗？`,
      `${a}、${b}、${c}三方混战，谁活到最后？`,
      `${a}、${b}、${c}擂台赛，谁是冠军？`,
      `${a}、${b}、${c}生死局只活一个，是谁？`,
      `100只${a}能把${b}关进${c}里吗？`,
      `100只${a}围堵${b}，能塞进${c}吗？`,
      `${a}、${b}、${c}谁战斗力最离谱？`,
      `${a}、${b}、${c}单挑谁是战力天花板？`,
      `100只${a}和1只${b}比吃${c}，谁更猛？`,
      `${a}、${b}、${c}开战，谁战术最阴险？`,
      `${a}、${b}、${c}组队，谁最拖后腿？`
      `100只${a}围攻1只${b}，谁能赢？`,
    
    `${a}和${b}同时保护${c}，谁更靠谱？`,
    `${a}和${b}比赛逃跑，谁跑得更快？`,
    `100只${a}守着${c}，${b}能偷到手吗？`,
    `${a}、${b}、${c}一起逃跑，谁最先掉队？`,
    `${a}伪装成${b}，能骗过其他人吗？`,
    `${a}和${b}掉进${c}里，谁能先出来？`,
    `100只${a}设陷阱，${b}会中招吗？`,
    `${a}和${b}比赛耐力，谁撑得更久？`,
    `${a}、${b}、${c}一起冒险，谁最冷静？`,
    `1只${a}守住路口，100只${b}能冲过去吗？`,

    `上课点名，${a}、${b}谁最会替答到？`,
    `干饭时，谁最可能把${c}吃光？`,
    `睡过头，${a}、${b}谁最会编理由？`,
    `躲猫猫，谁能把${c}藏到最后不被发现？`,
    `谁最会在老师眼皮底下摸鱼？`,
    `抢座位大赛，${a}、${b}谁最狠？`,
    `谁最容易被零食骗走？`,
    `讲冷笑话，${a}、${b}谁最尬？`,
    `谁走路最容易平地摔？`,
    `熬夜大赛，谁能撑到最后？`,
    `谁一紧张就胡言乱语？`,
    `拍照，${a}、${b}谁最会抢镜？`,
    `谁最容易被自己吓到？`,
    `谁能把${c}藏到自己都找不到？`,
    `谁最嘴上厉害实战秒怂？`,
    `谁吃辣最菜还硬撑？`,
    `谁一开心就原地发疯？`,
    `谁最会把小事搞炸？`,
    `讲八卦，${a}、${b}谁传最快？`,
    `谁最会一本正经胡说八道？`
    ];

    const i = Math.floor(Math.random() * questions.length);
    currentQuestion = questions[i];
    question.textContent = currentQuestion;
  });

  toAnswerBtn.addEventListener('click', () => {
    if (!currentQuestion) { alert('请先生成问题！'); return; }
    square.classList.remove('show');
    setTimeout(() => {
      answer.classList.add('show');
      answerQuestion.textContent = currentQuestion;
      answerContent.textContent = generateFunnyAnswer(A.value, B.value, C.value, currentQuestion);
    }, 400);
  });

  backToSquare.addEventListener('click', () => {
    answer.classList.remove('show');
    setTimeout(() => square.classList.add('show'), 400);
  });

  backToBoard.addEventListener('click', () => {
    answer.classList.remove('show');
    setTimeout(() => board.classList.add('show'), 400);
  });

  answer.addEventListener('click', (e) => {
    if (e.target.closest('#floatComment') || e.target.closest('.glass-btn')) return;
    showCommentAtPosition(e.clientX, e.clientY);
  });

  function showCommentAtPosition(x, y) {
    floatComment.style.left = x + 'px';
    floatComment.style.top = y + 'px';
    floatComment.style.display = 'block';
    commentText.value = '';
    commentText.focus();
  }

  cCancel.addEventListener('click', () => {
    floatComment.style.display = 'none';
  });

  cSubmit.addEventListener('click', () => {
    const t = commentText.value.trim();
    if (t) {
      alert('评论成功：' + t);
      floatComment.style.display = 'none';
    } else {
      alert('写点东西再发吧');
    }
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('#floatComment')) {
      floatComment.style.display = 'none';
    }
  });

  // 真人风答案
  function generateFunnyAnswer(a, b, c, question) {
    const ans = [
      {
        q: "围攻1只",
        a: `说实话，这局真没什么悬念。100只${a}一拥而上，直接把${b}围得水泄不通，连个转身的空都没有。前排的死死咬住腿不让动，中间的扑上去挠脸、咬脖子，后面的还在源源不断往上冲。${b}就算再能打，挥一下胳膊顶多打飞两三个，转头又被新的扑上来，根本喘不过气。打不了多久，${b}就累得抬不起胳膊，只能被${a}们压在地上，输得明明白白。`
      },
      {
        q: "正面硬刚",
        a: `正面硬刚的话，100只${a}真的太占优势了。它们排成一排，一步一步往前压，气势直接拉满。${b}每一次挥拳都只能打穿一小片，刚把前面的打退，后面的又补上来了，根本停不下来。打着打着，${b}的力气就跟不上了，动作越来越慢，而${a}们还是跟刚开始一样猛，最后只能被推着往后退，彻底输掉。`
      },
      {
        q: "突袭",
        a: `突袭这事儿，100只${a}简直是专业的。趁着${b}没注意，从四面八方突然冲出来，瞬间就贴到了身上。${b}刚反应过来想还手，已经被好几只按住了胳膊腿，连抬手的机会都没有。就这么一会儿功夫，${a}们已经把它缠得死死的，一波直接带走，根本没给反抗的机会。`
      },
      {
        q: "死斗到全灭",
        a: `死斗不退的话，拼的就是耐力和韧性了。100只${a}根本不怕死，倒了一个立刻有下一个补上，进攻节奏一点都不慢。${b}就算能一个打十个，打久了也会累啊，挥一下胳膊都费劲。打着打着，${b}的动作就慢了，破绽越来越多，最后被${a}们抓住机会，彻底放倒，再也爬不起来。`
      },
      {
        q: "穿越到",
        a: `100只${a}跑到${b}的世界，真的活不了多久。那边的环境跟它们熟悉的完全不一样，到处都是没见过的危险，刚落地就懵了。队形直接散了，有的乱跑，有的瞎撞，还没等遇到真正的敌人，自己先乱成一团。再加上${b}世界里的怪物到处都是，一口一个，没一会儿就全没了，根本撑不住。`
      },
      {
        q: "闯入地盘",
        a: `${a}们贸然闯进${b}的地盘，纯纯是送菜。${b}在自己家，哪块有坑、哪块能埋伏，门儿清。${a}们刚进来，就被${b}盯上了，直接从暗处冲出来，打它们个措手不及。${a}们还没反应过来，就被分割包围，一个个被收拾掉，根本没机会组织反击，直接被清干净了。`
      },
      {
        q: "主场作战",
        a: `在${b}的主场打，${a}们真的太吃亏了。${b}熟悉每一个角落，能绕着${a}们打，打几下就躲起来，等${a}们累了再出来偷袭。${a}们追也追不上，打也打不着，只能被牵着鼻子走，体力一点点被耗光。没几个回合，就累得不行了，阵型一散，直接被${b}挨个收拾，撑不了多久。`
      },
      {
        q: "抢",
        a: `抢${c}这种事，100只${a}真的太会了。一部分${a}直接冲上去跟100只${b}硬刚，把它们死死缠住，另一部分直接绕后，直奔${c}。等${b}们反应过来，${c}已经被${a}们抱走了，还围了个圈守着。${b}们想冲进去抢，根本冲不破，只能眼睁睁看着${c}被带走，一点办法都没有。`
      },
      {
        q: "为",
        a: `为了${c}打起来，100只${a}真的稳赢。它们配合得特别好，冲锋的、掩护的、补刀的，分工明确。100只${b}虽然也猛，但打着打着就乱了，你冲我挡，互相耽误。${a}们就不一样了，一波接一波往上冲，越打越猛，把${b}们的阵型直接冲散，最后稳稳把${c}抢到手，赢到最后。`
      },
      {
        q: "先找到",
        a: `找藏起来的${c}，肯定是${a}们先找到啊。100只${a}可以分成好几队，把整个区域都搜一遍，犄角旮旯都不放过。${b}就一个，只能一个地方一个地方慢慢找，速度慢多了。等${b}才搜了一半，${a}们早就把${c}找到了，还守得严严实实，根本轮不到${b}。`
      },
      {
        q: "单挑100只",
        a: `1只${a}单挑100只${b}，真的能反杀。${a}特别灵活，根本不跟它们硬拼，绕着圈子打，每次只打一两个，打完就跑。${b}们人多，反而互相挡路，根本抓不到${a}。打着打着，${b}们就累了，队形也散了，${a}抓住机会，一个个收拾，最后把100只${b}全清完，自己还没怎么受伤，太帅了。`
      },
      {
        q: "被100只包围",
        a: `被100只${b}包围，${a}根本不慌。它不跟所有${b}硬刚，专门找包围圈最薄的地方，卯足了劲猛冲一下，直接把缺口撞开。${b}们还没反应过来，${a}已经冲出去了，拉开距离，根本抓不到。就这么一下，直接突围成功，100只${b}只能看着它跑掉，一点办法都没有。`
      },
